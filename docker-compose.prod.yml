services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: production
    expose:
      - "3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=https://${DOMAIN:-localhost}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "1337"
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=1337
      - APP_URL=https://${DOMAIN:-localhost}
      - ADMIN_PATH=/admin
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    expose:
      - "5432"
    env_file:
      - .env
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d project_forge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data_prod:
